name: Homegate
version: "1.0.5"
slug: homegate
description: Secure remote access to Home Assistant via Homegate tunnels
url: https://github.com/josh-richardson/homegate-addon
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8080
panel_icon: mdi:cloud-lock
map:
  - data:rw
init: false
options:
  api_base_url: "https://test.homegate.network/api"
  broker_url: "wss://broker-test.homegate.network"
  hostname_domain: "test.homegate.network"
schema:
  api_base_url: url
  broker_url: url
  hostname_domain: str
